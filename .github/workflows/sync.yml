name: Sync Upstream

# Checks daily for new Bindy releases and regenerates the Helm charts.
# Can also be triggered manually to pin a specific version.
on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:
    inputs:
      version:
        description: 'Bindy release tag (e.g. v0.5.2 — leave empty for latest)'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT when you need the commit to trigger the release workflow.
          # With the default GITHUB_TOKEN, pushes do NOT trigger other workflows.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Generate charts
        run: |
          chmod +x generate.sh
          ./generate.sh "${{ inputs.version }}"

      - name: Detect changes
        id: diff
        run: |
          # Stage everything first — git diff only sees tracked files,
          # so untracked new files would be silently ignored without this.
          git add charts/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No chart changes detected — already up to date."
          else
            VERSION=$(grep '^appVersion:' charts/bindy/Chart.yaml \
                      | awk '{print $2}' | tr -d '"')
            echo "changed=true"       >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Charts updated for Bindy ${VERSION}"
          fi

      - name: Commit updated charts
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # charts/ is already staged from the detect step
          git commit -m "chore: sync charts for Bindy ${{ steps.diff.outputs.version }}"
          git push
