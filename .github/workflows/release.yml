name: Release Charts

# Packages and publishes charts to GitHub Pages whenever the charts/ directory
# changes on main (i.e. after a sync commit or a manual chart edit).
#
# Pre-requisites:
#   1. Enable GitHub Pages on the `gh-pages` branch in repository Settings.
#   2. The default GITHUB_TOKEN has `contents: write` (granted below).
on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
  workflow_dispatch:
  # Called directly by sync.yml to bypass the GITHUB_TOKEN push restriction
  # (pushes made by GITHUB_TOKEN do not trigger on:push in other workflows).
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bootstrap gh-pages branch if missing
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "gh-pages branch not found — bootstrapping..."
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null
            printf 'apiVersion: v1\nentries: {}\ngenerated: "0001-01-01T00:00:00Z"\n' > index.yaml
            git add index.yaml
            git commit -m "chore: bootstrap gh-pages branch for Helm chart releases"
            git push origin gh-pages
            git checkout -
            echo "gh-pages branch created and pushed."
          else
            echo "gh-pages branch already exists, skipping bootstrap."
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Package and release charts
        uses: helm/chart-releaser-action@v1.6.0
        with:
          config: .github/cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
